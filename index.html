<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Juan Carlos Chavez Machaca">
  <title>Propuestas de Proyectos — WebJuan</title>
  <meta name="description" content="Formulario de captación de proyectos JCCHM conectado a WebCodigo">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body { background: #121212; color: #f0f0f0; font-family: sans-serif; }
    .card { background: #1e1e1e; border: 2px solid #333; border-radius: 12px; }
    .form-control, .form-select {
      background: #2a2a2a !important;
      border: 1px solid #444 !important;
      color: #f0f0f0 !important;
    }
    .form-control:focus {
      border-color: #7c3aed !important;
      box-shadow: 0 0 0 2px rgba(124,58,237,0.25) !important;
    }
    .form-label { color: #aaa; font-size: .85rem; font-weight: 500; }
    .btn-morado { background: #7c3aed; border: none; color: #fff; padding: 12px; font-weight: 600; }
    .btn-morado:hover { background: #6d28d9; color: #fff; }
    
    .upload-area {
      border: 2px dashed #444; border-radius: 8px; background: #2a2a2a;
      padding: 1.5rem; text-align: center; cursor: pointer;
      position: relative; transition: border-color .2s;
    }
    .upload-area:hover { border-color: #7c3aed; }
    .upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    #preview-img { max-height: 180px; border-radius: 8px; border: 1px solid #444; display: none; margin: 10px auto; }
    
    .header-bar { background:#1a0a2e; border-bottom:2px solid #7c3aed; padding: 1rem 0; }
  </style>
</head>
<body>

  <div class="header-bar">
    <div class="container text-center">
      <h5 class="mb-0" style="color:#c4b5fd;"><i class="bi bi-code-slash me-2"></i>WebJuan — Propuestas Web</h5>
    </div>
  </div>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-lg-7">
        
        <div class="card p-4 shadow-lg">
          <div class="mb-4">
            <h4 class="mb-1">Cuéntanos tu idea</h4>
            <p class="text-muted small">Registra tu propuesta para que podamos analizarla y contactarte.</p>
          </div>

          <!-- FORMULARIO CONECTADO A WEBCODIGO -->
          <form id="reservaForm" novalidate>
            <!-- Acción para que WebCodigo sepa que es una propuesta nueva -->
            <input type="hidden" name="accion" value="nueva">
            <!-- URL que vendrá de Cloudinary -->
            <input type="hidden" name="url_referencia" id="url_referencia">

            <div class="row g-3">
              <div class="col-12">
                <label class="form-label">Nombre completo</label>
                <input type="text" class="form-control" name="nombre" placeholder="Ej: Juan Perez" required minlength="3">
              </div>

              <div class="col-md-6">
                <label class="form-label">Teléfono / WhatsApp</label>
                <input type="tel" class="form-control" name="telefono" placeholder="77123456" required pattern="[0-9]{8,11}">
              </div>

              <div class="col-md-6">
                <label class="form-label">Correo electrónico</label>
                <input type="email" class="form-control" name="correo" placeholder="ejemplo@gmail.com" required>
              </div>

              <div class="col-12">
                <label class="form-label">Descripción de tu proyecto (Obs_cliente)</label>
                <textarea class="form-control" name="obs_cliente" rows="4" maxlength="500" placeholder="¿Qué necesitas que desarrollemos?" required></textarea>
              </div>

              <!-- CARGA DE IMAGEN (CLOUDINARY) -->
              <div class="col-12">
                <label class="form-label" style="color:#c4b5fd;"><i class="bi bi-image me-1"></i>Imagen de referencia (Opcional)</label>
                <div class="upload-area" id="uploadArea">
                  <input type="file" id="comprobante" accept="image/*" onchange="handleFile(this)">
                  <i class="bi bi-cloud-arrow-up" style="font-size:2rem; color:#7c3aed;"></i>
                  <p class="mt-2 mb-0">Haz clic o arrastra una captura de referencia</p>
                  <p style="font-size:.7rem; color:#666;">JPG, PNG — máx. 5MB</p>
                </div>
                <img id="preview-img" src="" alt="Vista previa">
                <div id="uploadStatus" style="font-size:.78rem; color:#a78bfa; margin-top:.4rem; display:none; text-align:center;"></div>
              </div>

              <button type="submit" class="btn btn-morado w-100 mt-3" id="btnEnviar">
                <span id="btnText"><i class="bi bi-send-fill me-2"></i>Enviar Propuesta</span>
                <span id="btnLoading" style="display:none;">
                  <span class="spinner-border spinner-border-sm me-2"></span>Procesando...
                </span>
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script>
    // --- DATOS DE TU IMPLEMENTACIÓN ---
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzHRxeLzCId6d7Ul3BblQ2jw4oXKBjH1MkNyrSwzucLNYCBphTfADTqh0_eMU0QwJU/exec';
    const CLOUDINARY_CLOUD = 'dpfoul2dc';
    const CLOUDINARY_PRESET = 'Unsigned';

    const form = document.getElementById('reservaForm');

    // Preview de imagen
    function handleFile(input) {
      const file = input.files[0];
      if (!file) return;
      if (file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = e => {
          const img = document.getElementById('preview-img');
          img.src = e.target.result;
          img.style.display = 'block';
        };
        reader.readAsDataURL(file);
      }
    }

    // Subida a Cloudinary
    async function subirImagen(file) {
      const formData = new FormData();
      formData.append('file', file);
      formData.append('upload_preset', CLOUDINARY_PRESET);
      const resp = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/upload`, {
        method: 'POST',
        body: formData
      });
      const data = await resp.json();
      return data.secure_url;
    }

    // Envío principal
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!form.checkValidity()) { form.reportValidity(); return; }

      setBtnLoading(true);
      const statusDiv = document.getElementById('uploadStatus');

      try {
        // 1. Subir a Cloudinary si hay archivo
        const fileInput = document.getElementById('comprobante');
        if (fileInput.files.length > 0) {
          statusDiv.style.display = 'block';
          statusDiv.textContent = '⏳ Subiendo imagen de referencia...';
          const url = await subirImagen(fileInput.files[0]);
          document.getElementById('url_referencia').value = url;
          statusDiv.textContent = '✅ Imagen lista.';
        }

        // 2. Enviar a WebCodigo
        statusDiv.textContent = '🚀 Enviando propuesta al sistema...';
        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          body: new FormData(form)
        });

        const result = await response.json();
        
        if (result.status === 'ok' || result.id) {
          alert('¡Propuesta recibida! Tu ID de seguimiento es: ' + (result.id || 'Generado'));
          form.reset();
          document.getElementById('preview-img').style.display = 'none';
        }

      } catch (err) {
        console.error(err);
        alert('Error al enviar. Revisa la consola o tu configuración de WebCodigo.');
      } finally {
        setBtnLoading(false);
        statusDiv.style.display = 'none';
      }
    });

    function setBtnLoading(on) {
      document.getElementById('btnEnviar').disabled = on;
      document.getElementById('btnText').style.display = on ? 'none' : 'inline';
      document.getElementById('btnLoading').style.display = on ? 'inline' : 'none';
    }
  </script>
</body>
</html>
